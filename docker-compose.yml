services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
      - "8081:8081"
    environment:
      - DATABASE_URL=postgres://rueditor:rueditor@postgres:5432/rueditor?sslmode=disable
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET:-supersecretkey123}
      - PORT=8080
      - WS_PORT=8081
    depends_on:
      - postgres
      - redis
    volumes:
      - latex_data:/app/data
    networks:
      - ruleditor_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=http://localhost:8080/api/v1
      - REACT_APP_WS_URL=ws://localhost:8081/api/v1/ws
    depends_on:
      - backend
    networks:
      - ruleditor_network

  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=rueditor
      - POSTGRES_PASSWORD=rueditor
      - POSTGRES_DB=rueditor
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - ruleditor_network

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    networks:
      - ruleditor_network

volumes:
  latex_data:
  postgres_data:
  redis_data:

networks:
  ruleditor_network:
    driver: bridge
